<script>
    document.addEventListener("DOMContentLoaded", function () {
    const searchInput = document.getElementById("search-input");
    const searchButton = document.getElementById("search-button");
    
    function performSearch() {
        const query = searchInput.value.trim();
        
        if (query) {
            // Perform search within existing content, e.g., filtering a list of posts
            const posts = document.querySelectorAll('.post'); // Change this selector to your content
            posts.forEach(post => {
                const postTitle = post.querySelector('.title').textContent.toLowerCase();
                if (postTitle.includes(query.toLowerCase())) {
                    post.style.display = 'block';  // Show matching posts
                } else {
                    post.style.display = 'none';   // Hide non-matching posts
                }
            });
        }
    }

    // Trigger search when clicking the button
    searchButton.addEventListener("click", performSearch);

    // Trigger search when pressing "Enter"
    searchInput.addEventListener("keypress", function (event) {
        if (event.key === "Enter") {
            performSearch();
        }
    });
});
</script>
