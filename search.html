---
layout: default
permalink: /search.html
---

<!-- <ul id="search-results"></ul> -->
<ul id="search-results" style="list-style: none; padding: 0; display: flex; flex-direction: column; align-items: center;">
</ul>

<script>
  window.store = {
    {% for post in site.articles %}
      "{{ post.url | slugify }}": {
        "title": "{{ post.title | xml_escape }}",
        "url": "{{ post.url | xml_escape }}",
        "enseigne": "{{ site.data.enseignes.enseignes[post.enseigne].name | escape }}",
        "image": "{{ site.baseurl }}/assets/img/escape/{{ post.image_name }}"
      }
      {% unless forloop.last %},{% endunless %}
    {% endfor %}
  };
</script>

<script src="assets/js/lunr.min.js"></script>
<script src="assets/js/search.js"></script>
