---
layout: default
---

<style>
    /* Grid layout with 3 columns and minimal spacing */
    .grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px; /* Almost no space between items */
        text-align: center;
        padding: 0; /* Remove outer padding */
    }
    
    .grid-item {
        position: relative;
        overflow: hidden;
        border-radius: 5px;
        width: 100%;
    }

    .grid-item img {
        width: 100%;
        height: 180px; /* Keep images uniform */
        object-fit: cover;
        transition: transform 0.3s ease-in-out;
        border-radius: 5px;
        display: block;
    }

    .grid-item:hover img {
        transform: scale(1.05);
    }

    .grid-item .overlay {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        text-align: center;
        font-size: 1.1em;
        font-weight: bold;
        padding: 6px;
        opacity: 1;
    }

    .grid-item a {
        display: block;
        text-decoration: none;
        color: inherit;
    }

    /* Keep 3 columns on mobile with even smaller gaps */
    @media (max-width: 768px) {
        .grid-container {
            grid-template-columns: repeat(3, 1fr);
            gap: 1px; /* Reduce space even further on small screens */
        }

        .grid-item img {
            height: 140px; /* Smaller images for mobile */
        }

        .grid-item .overlay {
            font-size: 1em;
            padding: 5px;
        }
    }
</style>

<div class="grid-container">
    {% for article in site.top-world %}
        <div class="grid-item">
            <a href="{{ article.url }}">
                <img src="{{ base_url }}/assets/img/top-world/{{ article.image_name }}" alt="{{ article.title }}">
                <div class="overlay">{{ article.title }}</div>
            </a>
        </div>
    {% endfor %}
</div>
