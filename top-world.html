---
layout: default
---
<style>
    /* Grid layout with responsive design */
    .grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        text-align: center;
        padding: 0;
    }

    .grid-item {
        position: relative;
        overflow: hidden;
        border-radius: 5px;
        width: 100%;
    }

    .grid-item img {
        width: 100%;
        height: auto;
        max-width: 100%;
        object-fit: cover;
        transition: transform 0.3s ease-in-out;
        border-radius: 5px;
        display: block;
        will-change: transform;
    }

    .grid-item:hover img {
        transform: scale(1.05);
    }

    .grid-item .overlay {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        text-align: center;
        font-size: calc(1vw + 1em); /* Scales with viewport width */
        font-weight: bold;
        padding: calc(0.5vw + 6px); /* Scales with viewport width */
        opacity: 1;
    }

    .grid-item a {
        display: block;
        text-decoration: none;
        color: inherit;
    }

    /* Mobile and tablet view adjustments */
    @media (max-width: 768px) {
        .grid-container {
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
        }

        .grid-item img {
            height: 140px;
        }

        .grid-item .overlay {
            font-size: 1em;
            padding: 5px;
        }
    }

    @media (max-width: 480px) {
        .grid-container {
            grid-template-columns: 1fr;
            gap: 1px;
        }

        .grid-item img {
            height: 120px;
        }

        .grid-item .overlay {
            font-size: 0.9em;
            padding: 4px;
        }
    }
</style>

<div class="grid-container">
    {% for article in site.top-world %}
        <div class="grid-item">
            <a href="{{ article.url }}">
                <img src="{{ base_url }}/assets/img/top-world/{{ article.image_name }}" alt="{{ article.title }}" loading="lazy">
                <div class="overlay">{{ article.title }}</div>
            </a>
        </div>
    {% endfor %}
</div>
